# Cargo build configuration for faster compilation
# See docs/BUILD_OPTIMIZATION.md for details

# Use faster linker on Windows (requires lld to be installed)
# Install with: rustup component add llvm-tools-preview
# Or install LLD separately: https://lld.llvm.org/
[target.x86_64-pc-windows-msvc]
# Uncomment the line below if you have lld installed:
# linker = "lld-link"

# Alternative: use mold on Linux for even faster linking
# [target.x86_64-unknown-linux-gnu]
# linker = "clang"
# rustflags = ["-C", "link-arg=-fuse-ld=mold"]

# Enable parallel frontend for faster compilation
# Note: jobs = 0 is not valid; omit to use all cores automatically

# Incremental compilation settings (default in dev, but explicit here)
[profile.dev]
incremental = true
# Use minimal debug info for faster builds
debug = "line-tables-only"

# For quick iteration without losing too much performance
[profile.dev-fast]
inherits = "dev"
opt-level = 2
debug = false
incremental = true

# Faster release builds during development (less LTO)
[profile.release-fast]
inherits = "release"
lto = "thin"
codegen-units = 4
