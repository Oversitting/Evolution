# Evolution Simulator Configuration
# Omitted values use built-in defaults.
# Invariant-controlled values such as vision.rays and system.readback_interval
# are intentionally omitted; the runtime enforces the required safe values.

# seed = 42

[population]
max_organisms = 4000
initial_organisms = 180

[energy]
starting = 70.0
maximum = 200.0
passive_drain = 0.095
max_age = 2000
crowding_factor = 1.0
age_drain_factor = 1.0

[reproduction]
threshold = 60.0
cost = 40.0
min_age = 100
cooldown = 90
signal_min = 0.3

[mutation]
rate = 0.05
strength = 0.2

[food]
growth_rate = 0.0050
max_per_cell = 10.0
energy_value = 4.0
effectiveness = 1.05
initial_patches = 360
patch_size = 10

[world]
width = 2048
height = 2048

[bootstrap]
enabled = true
path = "founder_pool.json"
founder_count = 16
survivor_count = 256
load_on_start = true
save_on_exit = true

[system]
food_readback_interval = 60
diagnostic_interval = 60

# Add optional sections like [predation], [biomes], [morphology], or extra
# [food] / [reproduction] overrides only when you want to change those defaults.